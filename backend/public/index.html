<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANS SIB Beneficiários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    #log-memo {
      font-family: monospace;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      resize: vertical;
      min-height: 160px;
    }
    #log-memo .log-error { color: #f48771; }
    #log-memo .log-warn  { color: #dcdcaa; }
    #log-memo .log-ok    { color: #4ec9b0; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function LogMemo({ lines }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
      }, [lines]);

      return (
        <textarea
          id="log-memo"
          ref={ref}
          className="form-control mt-3 w-100"
          readOnly
          rows={8}
          value={lines.join("\n")}
          placeholder="Log de processamento aparecerá aqui..."
        />
      );
    }

    function App() {
      const [file, setFile] = React.useState(null);
      const [xml, setXml] = React.useState("");
      const [isValid, setIsValid] = React.useState(null);
      const [fileName, setFileName] = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState("");
      const [logLines, setLogLines] = React.useState([]);

      const [sequencialTransacao, setSequencialTransacao] = React.useState(1);
      const [registroANS, setRegistroANS] = React.useState("");
      const [nomeAplicativo, setNomeAplicativo] = React.useState("");
      const [fabricanteAplicativo, setFabricanteAplicativo] = React.useState("");
      const [versaoAplicativo, setVersaoAplicativo] = React.useState("1.00");
      const [motivoNaoEnvioBeneficiarios, setMotivoNaoEnvioBeneficiarios] = React.useState("");
      const [tipoTransacao] = React.useState("ATUALIZACAO SIB");
      const [cnpjDestino] = React.useState("03589068000146");

      const addLog = (lines) => setLogLines((prev) => [...prev, ...lines]);
      const clearLog = () => setLogLines([]);

      const handleFileChange = (e) => {
        setFile(e.target.files[0]);
        setError("");
      };

      const handleUpload = async () => {
        if (!registroANS || registroANS.length !== 6) {
          setError("Registro ANS é obrigatório e deve ter 6 dígitos");
          return;
        }
        if (!nomeAplicativo) { setError("Nome do aplicativo é obrigatório"); return; }
        if (!fabricanteAplicativo) { setError("Fabricante do aplicativo é obrigatório"); return; }
        if (!versaoAplicativo) { setError("Versão do aplicativo é obrigatória"); return; }
        if ((motivoNaoEnvioBeneficiarios === "61" || motivoNaoEnvioBeneficiarios === "62") && file) {
          setError("Não é necessário importar arquivo de beneficiários para o motivo selecionado.");
          return;
        }
        if (!file && motivoNaoEnvioBeneficiarios === "") {
          setError("Por favor, selecione um arquivo CSV ou informe o motivo de não envio.");
          return;
        }

        setLoading(true);
        setError("");
        clearLog();
        setIsValid(null);
        setXml("");

        try {
          let xmlResponse;

          if (motivoNaoEnvioBeneficiarios === "61" || motivoNaoEnvioBeneficiarios === "62") {
            const response = await axios.post("/api/csv/process", {
              sequencialTransacao, registroANS, nomeAplicativo, fabricanteAplicativo,
              versaoAplicativo, motivoNaoEnvioBeneficiarios, cnpjDestino,
            });
            xmlResponse = response.data;
          } else {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("sequencialTransacao", sequencialTransacao);
            formData.append("registroANS", registroANS);
            formData.append("nomeAplicativo", nomeAplicativo);
            formData.append("fabricanteAplicativo", fabricanteAplicativo);
            formData.append("versaoAplicativo", versaoAplicativo);
            formData.append("cnpjDestino", cnpjDestino);

            const uploadRes = await axios.post("/api/csv/upload", formData, {
              headers: { "Content-Type": "multipart/form-data" },
            });

            const processRes = await axios.post("/api/csv/process", {
              filePath: uploadRes.data.filePath,
              sequencialTransacao, registroANS, nomeAplicativo, fabricanteAplicativo,
              versaoAplicativo, cnpjDestino,
            });
            xmlResponse = processRes.data;
          }

          setXml(xmlResponse.xml);
          setIsValid(xmlResponse.isValid);
          setFileName(xmlResponse.fileName);

          const newLog = [];
          newLog.push(`[OK] ${xmlResponse.totalProcessados ?? xmlResponse.recordCount} registro(s) processado(s) — Arquivo: ${xmlResponse.fileName}`);

          if ((xmlResponse.totalRejeitados ?? 0) > 0) {
            newLog.push(`[AVISO] ${xmlResponse.totalRejeitados} linha(s) do CSV rejeitada(s):`);
            (xmlResponse.errosCSV || []).forEach((e) =>
              newLog.push(`  [CSV] Linha ${e.linha} (${e.campo}): ${e.mensagem}`)
            );
          }

          if (xmlResponse.isValid) {
            newLog.push("[OK] XML válido conforme schema XSD da ANS");
          } else {
            newLog.push(`[ERRO] XML inválido — ${(xmlResponse.errors || []).length} erro(s) XSD:`);
            (xmlResponse.errors || []).forEach((e) => newLog.push(`  ${e.formatted || e.message || String(e)}`));
          }

          addLog(newLog);
        } catch (err) {
          const data = err.response?.data;

          if (data?.algorithmErrors && data.algorithmErrors.length > 0) {
            // Erros de algoritmo ANS (HTTP 422)
            setError(data.error || "Erros de validação ANS encontrados. Verifique o log.");
            const algLog = ["[ERRO] Validação ANS bloqueou a geração do XML:"];
            data.algorithmErrors.forEach((e) =>
              algLog.push(`  [ALG] Linha ${e.row} - ${e.field}: ${e.message}${e.value ? ` (valor: '${e.value}')` : ""}`)
            );
            addLog(algLog);
          } else if (data?.errosCSV && data.errosCSV.length > 0) {
            // Nenhuma linha válida no CSV (HTTP 422)
            setError(data.error || "Nenhuma linha válida encontrada no CSV.");
            const csvLog = [`[ERRO] ${data.totalRejeitados} linha(s) rejeitada(s) — nenhum registro válido para gerar XML:`];
            data.errosCSV.forEach((e) =>
              csvLog.push(`  [CSV] Linha ${e.linha} (${e.campo}): ${e.mensagem}`)
            );
            addLog(csvLog);
          } else {
            setError(data?.error || "Erro ao processar arquivo");
            if (data?.error) addLog([`[ERRO] ${data.error}`]);
          }
        } finally {
          setLoading(false);
        }
      };

      const handleDownload = () => {
        const blob = new Blob([xml], { type: "application/xml" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName || "beneficiarios_sib.xml";
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleXMLValidate = async (e) => {
        const xmlFile = e.target.files[0];
        if (!xmlFile) return;

        clearLog();
        addLog([`[INFO] Validando arquivo: ${xmlFile.name}...`]);

        const reader = new FileReader();
        reader.onload = async (event) => {
          const xmlContent = event.target.result;
          try {
            const response = await axios.post("/api/xml/validate", { xml: xmlContent });
            if (response.data.isValid) {
              addLog([
                "========================================",
                "[OK] XML válido conforme schema XSD da ANS",
                "========================================",
              ]);
            } else {
              const errors = response.data.errors || [];
              const errLog = [
                "========================================",
                `[ERRO] XML inválido — ${errors.length} erro(s) encontrado(s):`,
                "----------------------------------------",
              ];
              errors.forEach((e, i) => {
                const line = e.line > 0 ? `Linha ${e.line}` : "Linha ?";
                const col  = e.column > 0 ? `, Col ${e.column}` : "";
                const msg  = (e.message || String(e)).trim();
                errLog.push(`  [${i + 1}] ${line}${col}: ${msg}`);
              });
              errLog.push("========================================");
              addLog(errLog);
            }
          } catch (err) {
            if (err.response?.status === 413) {
              addLog(["[ERRO] Arquivo XML muito grande para validação. Reduza o tamanho do arquivo."]);
            } else {
              addLog([`[ERRO] Falha ao validar XML: ${err.message}`]);
            }
          }
        };
        reader.readAsText(xmlFile);
        e.target.value = "";
      };

      return (
        <div className="container mt-5">
          <div className="row justify-content-center">
            <div className="col-md-8">
              <div className="card">
                <div className="card-header">
                  <h3 className="card-title mb-0">
                    ANS SIB - Gerador de XML de Beneficiários
                  </h3>
                </div>
                <div className="card-body">
                  <div className="mb-3">
                    <label htmlFor="sequencialTransacao" className="form-label">Sequencial da Transação</label>
                    <input type="number" id="sequencialTransacao" className="form-control"
                      value={sequencialTransacao} onChange={(e) => setSequencialTransacao(e.target.value)} min={1} />
                  </div>
                  <div className="mb-3">
                    <label htmlFor="registroANS" className="form-label">Registro ANS *</label>
                    <input type="text" id="registroANS" className="form-control"
                      value={registroANS} onChange={(e) => setRegistroANS(e.target.value)}
                      required maxLength={6} pattern="[0-9]{6}" title="Deve conter exatamente 6 dígitos" />
                    <small className="form-text text-muted">Exemplo: 424561</small>
                  </div>
                  <div className="mb-3">
                    <label htmlFor="nomeAplicativo" className="form-label">Nome do Aplicativo *</label>
                    <input type="text" id="nomeAplicativo" className="form-control"
                      value={nomeAplicativo} onChange={(e) => setNomeAplicativo(e.target.value)} required />
                  </div>
                  <div className="mb-3">
                    <label htmlFor="fabricanteAplicativo" className="form-label">Fabricante do Aplicativo *</label>
                    <input type="text" id="fabricanteAplicativo" className="form-control"
                      value={fabricanteAplicativo} onChange={(e) => setFabricanteAplicativo(e.target.value)} required />
                  </div>
                  <div className="mb-3">
                    <label htmlFor="versaoAplicativo" className="form-label">Versão do Aplicativo *</label>
                    <input type="text" id="versaoAplicativo" className="form-control"
                      value={versaoAplicativo} onChange={(e) => setVersaoAplicativo(e.target.value)} required />
                    <small className="form-text text-muted">Exemplo: 1.00, 2.15, etc.</small>
                  </div>
                  <div className="mb-3">
                    <label htmlFor="motivoNaoEnvioBeneficiarios" className="form-label">Código de Não Envio de Beneficiários</label>
                    <select id="motivoNaoEnvioBeneficiarios" className="form-select"
                      value={motivoNaoEnvioBeneficiarios} onChange={(e) => setMotivoNaoEnvioBeneficiarios(e.target.value)}>
                      <option value="">-- Selecione --</option>
                      <option value="61">61 - Inexistência de beneficiários na competência</option>
                      <option value="62">62 - Inexistência de Atualização cadastral na competência</option>
                    </select>
                  </div>
                  <div className="mb-3">
                    <label htmlFor="tipoTransacao" className="form-label">Tipo de Transação</label>
                    <input type="text" id="tipoTransacao" className="form-control" value={tipoTransacao} readOnly />
                  </div>
                  <div className="mb-3">
                    <label htmlFor="cnpjDestino" className="form-label">CNPJ Destino</label>
                    <input type="text" id="cnpjDestino" className="form-control" value={cnpjDestino} readOnly />
                  </div>
                  <div className="mb-3">
                    <label htmlFor="csvFile" className="form-label">Arquivo CSV com dados dos beneficiários:</label>
                    <input type="file" id="csvFile" accept=".csv" onChange={handleFileChange} className="form-control"
                      disabled={motivoNaoEnvioBeneficiarios === "61" || motivoNaoEnvioBeneficiarios === "62"} />
                    <div className="form-text">Delimitador ponto-e-vírgula (;). Colunas: nome, cpf, dataNascimento, etc.</div>
                  </div>

                  <div className="mb-3">
                    <label htmlFor="xmlFile" className="form-label">Validar XML existente contra o schema ANS</label>
                    <input type="file" id="xmlFile" accept=".xml,.sbx" onChange={handleXMLValidate} className="form-control" />
                    <div className="form-text">Resultado aparece no log abaixo.</div>
                  </div>

                  {error && (
                    <div className="alert alert-danger" role="alert">
                      {error}
                    </div>
                  )}

                  <button className="btn btn-primary btn-lg w-100"
                    onClick={handleUpload}
                    disabled={loading || (!file && motivoNaoEnvioBeneficiarios === "")}>
                    {loading ? (
                      <><span className="spinner-border spinner-border-sm me-2" role="status"></span>Processando...</>
                    ) : (
                      <>Gerar XML</>
                    )}
                  </button>

                  {isValid !== null && (
                    <div className={`alert mt-4 ${isValid ? "alert-success" : "alert-danger"}`}>
                      <h6 className="alert-heading">
                        {isValid ? "XML Válido!" : "XML Inválido!"}
                      </h6>
                      XML {isValid ? "está conforme" : "não está conforme"} os schemas XSD da ANS
                      <br />
                      <small>Arquivo: {fileName}</small>
                    </div>
                  )}

                  {xml && isValid && (
                    <div className="mt-3">
                      <button className="btn btn-success btn-lg w-100" onClick={handleDownload}>
                        Download XML ({fileName})
                      </button>
                    </div>
                  )}

                  <div className="mt-3">
                    <div className="d-flex justify-content-between align-items-center">
                      <label className="form-label mb-0"><strong>Log de Processamento</strong></label>
                      {logLines.length > 0 && (
                        <button className="btn btn-sm btn-outline-secondary" onClick={clearLog}>Limpar</button>
                      )}
                    </div>
                    <LogMemo lines={logLines} />
                  </div>
                </div>

                <div className="card-footer text-muted">
                  <small>
                    Sistema de geração de XML conforme especificações ANS/SIB |
                    <a href="https://www.gov.br/ans/pt-br/sobre-o-sib" target="_blank" className="ms-1">
                      Saiba mais sobre o SIB
                    </a>
                  </small>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</body>

</html>
